<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Synthetic Agent Governance Workbench dashboard preview</title>
  <desc id="desc">A static preview of the demo dashboard using fictional task, agent, risk, and approval data.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="56" y="48" width="1088" height="624" rx="24" fill="#ffffff" stroke="#dbe3ea"/>
  <text x="96" y="105" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Agent Governance Workbench</text>
  <text x="96" y="138" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Local-first dashboard for safer AI agent workflows</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="96" y="176" width="232" height="96" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="120" y="214" fill="#1e40af" font-size="15" font-weight="700">Tasks</text>
    <text x="120" y="252" fill="#0f172a" font-size="36" font-weight="700">4</text>

    <rect x="352" y="176" width="232" height="96" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="376" y="214" fill="#9a3412" font-size="15" font-weight="700">In Review</text>
    <text x="376" y="252" fill="#0f172a" font-size="36" font-weight="700">1</text>

    <rect x="608" y="176" width="232" height="96" rx="12" fill="#fef2f2" stroke="#fecaca"/>
    <text x="632" y="214" fill="#991b1b" font-size="15" font-weight="700">Blocked</text>
    <text x="632" y="252" fill="#0f172a" font-size="36" font-weight="700">1</text>

    <rect x="864" y="176" width="232" height="96" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="888" y="214" fill="#166534" font-size="15" font-weight="700">Done</text>
    <text x="888" y="252" fill="#0f172a" font-size="36" font-weight="700">1</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="16">
    <rect x="96" y="316" width="320" height="42" rx="21" fill="#e2e8f0"/>
    <rect x="102" y="322" width="112" height="30" rx="15" fill="#2563eb"/>
    <text x="126" y="342" fill="#ffffff" font-weight="700">Queue</text>
    <text x="236" y="342" fill="#475569">Agents</text>
    <text x="326" y="342" fill="#475569">Risks</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="96" y="390" width="480" height="82" rx="14" fill="#ffffff" stroke="#dbe3ea"/>
    <text x="120" y="424" fill="#0f172a" font-size="18" font-weight="700">Draft governance templates</text>
    <text x="120" y="452" fill="#475569" font-size="15">Owner: Builder - Risk: low - Evidence attached</text>
    <rect x="476" y="413" width="66" height="26" rx="13" fill="#16a34a"/>
    <text x="493" y="431" fill="#ffffff" font-size="13" font-weight="700">done</text>

    <rect x="96" y="496" width="480" height="82" rx="14" fill="#ffffff" stroke="#dbe3ea"/>
    <text x="120" y="530" fill="#0f172a" font-size="18" font-weight="700">Review public release package</text>
    <text x="120" y="558" fill="#475569" font-size="15">Owner: Reviewer - Risk: high - Privacy checklist</text>
    <rect x="466" y="519" width="76" height="26" rx="13" fill="#d97706"/>
    <text x="482" y="537" fill="#ffffff" font-size="13" font-weight="700">review</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="624" y="390" width="472" height="188" rx="16" fill="#0f172a"/>
    <text x="656" y="432" fill="#ffffff" font-size="22" font-weight="700">Default approval rule</text>
    <text x="656" y="468" fill="#cbd5e1" font-size="16">Low-risk work may proceed with a result card.</text>
    <text x="656" y="500" fill="#cbd5e1" font-size="16">Medium-risk work needs reviewer signoff.</text>
    <text x="656" y="532" fill="#cbd5e1" font-size="16">High-risk work stops for explicit human approval.</text>
  </g>

  <text x="96" y="630" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="14">Synthetic preview. No real users, customer data, local paths, or private task history.</text>
</svg>
